# GT06 stack — server + Redis (+ optional MySQL)
#
# Usage:
#   docker compose up --build              # server + Redis (no DB)
#   docker compose up --build -d           # detached
#   docker compose --profile db up --build # include MySQL
#   docker compose logs -f gt06            # server logs
#   docker compose down -v                 # stop and wipe volumes

services:

  # ── GT06 server ─────────────────────────────────────────────────────────────
  gt06:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: gt06-server:local
    restart: unless-stopped
    ports:
      - "${GT06_TCP_PORT:-7019}:7019"
      - "${GT06_HTTP_PORT:-9091}:9091"
    environment:
      GT06_TCP_ADDR:    ":7019"
      GT06_HTTP_ADDR:   ":9091"
      # Redis
      REDIS_HOST:       redis
      REDIS_PORT:       "6379"
      REDIS_PASSWORD:   "${REDIS_PASSWORD:-}"
      REDIS_GT06_DB:    "${REDIS_GT06_DB:-1}"
      REDIS_POOL_SIZE:  "${REDIS_POOL_SIZE:-100}"
      # Stream
      STREAM_KEY:       "${STREAM_KEY:-gt06:telemetry}"
      STREAM_MAX_LEN:   "${STREAM_MAX_LEN:-100000}"
      # DB (disabled by default — set DB_HOST to enable)
      DB_ENABLED:       "${DB_ENABLED:-false}"
      DB_HOST:          "${DB_HOST:-}"
      DB_PORT:          "${DB_PORT:-3306}"
      DB_USERNAME:      "${DB_USERNAME:-laravel}"
      DB_PASSWORD:      "${DB_PASSWORD:-secret}"
      DB_DATABASE:      "${DB_DATABASE:-laravel}"
      DB_DEVICE_TYPE_ID: "${DB_DEVICE_TYPE_ID:-2}"
      # Configurable table / column names
      DB_DEVICES_TABLE:    "${DB_DEVICES_TABLE:-devices}"
      DB_IMEI_COLUMN:      "${DB_IMEI_COLUMN:-imei}"
      DB_APPROVED_COLUMN:  "${DB_APPROVED_COLUMN:-is_approved}"
      DB_STATUS_COLUMN:    "${DB_STATUS_COLUMN:-status}"
      DB_TYPE_ID_COLUMN:   "${DB_TYPE_ID_COLUMN:-device_type_id}"
      DB_NAME_COLUMN:      "${DB_NAME_COLUMN:-name}"
      DB_NOTES_COLUMN:     "${DB_NOTES_COLUMN:-notes}"
      # Timing
      AUTH_TIMEOUT:      "${AUTH_TIMEOUT:-30s}"
      HEARTBEAT_TIMEOUT: "${HEARTBEAT_TIMEOUT:-3m}"
      WRITE_TIMEOUT:     "${WRITE_TIMEOUT:-10s}"
      APP_DEBUG:         "${APP_DEBUG:-true}"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9091/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - fleet_net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel notice
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_EXPOSE_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - fleet_net

  # ── MySQL (optional — enable with: docker compose --profile db up) ──────────
  mysql:
    image: mysql:8.0
    profiles: ["db"]
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rootsecret}"
      MYSQL_DATABASE:      "${DB_DATABASE:-laravel}"
      MYSQL_USER:          "${DB_USERNAME:-laravel}"
      MYSQL_PASSWORD:      "${DB_PASSWORD:-secret}"
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_EXPOSE_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${DB_USERNAME:-laravel}", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - fleet_net

volumes:
  redis_data:
  mysql_data:

networks:
  fleet_net:
    driver: bridge
